<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Space Mono', monospace;
      color: #e8e8e8;
    }
    #hud {
      display: flex;
      gap: 2rem;
      margin-bottom: 12px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
    #score-val { color: #ff6b4d; }
    #lives-val { color: #b5ff4d; }
    canvas {
      border: 1px solid #2a2a2a;
      display: block;
    }
    #info {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div id="hud">
    <span>SCORE: <span id="score-val">0</span></span>
    <span>LIVES: <span id="lives-val">3</span></span>
  </div>
  <canvas id="c" width="480" height="360"></canvas>
  <div id="info">← → ARROW KEYS OR MOUSE TO MOVE PADDLE</div>

  <script>
    const canvas = document.getElementById("c");
    const ctx    = canvas.getContext("2d");

    // ── GAME CONSTANTS ──
    const PAD_W  = 80;    // paddle width
    const PAD_H  = 10;    // paddle height
    const PAD_Y  = canvas.height - 30;  // paddle Y position
    const BALL_R = 7;     // ball radius
    const BRICK_COLS = 8;
    const BRICK_ROWS = 5;
    const BRICK_PAD  = 6;
    const BRICK_TOP  = 40;
    const BRICK_W = (canvas.width - BRICK_PAD * (BRICK_COLS + 1)) / BRICK_COLS;
    const BRICK_H = 18;

    // Brick row colours (top to bottom)
    const ROW_COLORS = ["#ff4d4d","#ff6b4d","#ffaa4d","#ffd84d","#b5ff4d"];

    let padX, ball, bricks, score, lives, gameRunning, animId;

    /* ── INIT ── */
    function init() {
      padX  = canvas.width / 2 - PAD_W / 2;
      ball  = { x: canvas.width / 2, y: PAD_Y - BALL_R - 1, dx: 3, dy: -3 };
      score = 0; lives = 3;
      gameRunning = true;
      buildBricks();
      updateHUD();
      cancelAnimationFrame(animId);
      loop();
    }

    /* ── BUILD BRICK GRID ── */
    function buildBricks() {
      bricks = [];
      for (let r = 0; r < BRICK_ROWS; r++) {
        bricks[r] = [];
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks[r][c] = { alive: true };
        }
      }
    }

    /* ── GAME LOOP ── */
    function loop() {
      if (!gameRunning) return;
      update();
      draw();
      animId = requestAnimationFrame(loop);
    }

    /* ── UPDATE LOGIC ── */
    function update() {
      // Move ball
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Wall bounces (left, right, top)
      if (ball.x - BALL_R < 0 || ball.x + BALL_R > canvas.width) ball.dx *= -1;
      if (ball.y - BALL_R < 0) ball.dy *= -1;

      // Paddle collision
      if (
        ball.y + BALL_R >= PAD_Y &&
        ball.y + BALL_R <= PAD_Y + PAD_H &&
        ball.x >= padX &&
        ball.x <= padX + PAD_W
      ) {
        // Vary bounce angle based on where ball hits paddle
        const hitPos = (ball.x - padX) / PAD_W; // 0 = left edge, 1 = right edge
        ball.dx = (hitPos - 0.5) * 8;            // -4 to +4
        ball.dy = -Math.abs(ball.dy);             // always bounce up
      }

      // Ball falls below paddle — lose a life
      if (ball.y - BALL_R > canvas.height) {
        lives--;
        updateHUD();
        if (lives === 0) {
          endGame("GAME OVER");
        } else {
          // Reset ball position
          ball.x  = canvas.width / 2;
          ball.y  = PAD_Y - BALL_R - 1;
          ball.dx = 3;
          ball.dy = -3;
        }
      }

      // Brick collision detection
      for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          const b = bricks[r][c];
          if (!b.alive) continue;

          const bx = BRICK_PAD + c * (BRICK_W + BRICK_PAD);
          const by = BRICK_TOP + r * (BRICK_H + BRICK_PAD);

          if (
            ball.x + BALL_R > bx && ball.x - BALL_R < bx + BRICK_W &&
            ball.y + BALL_R > by && ball.y - BALL_R < by + BRICK_H
          ) {
            b.alive = false;
            ball.dy *= -1;
            score += 10;
            updateHUD();
          }
        }
      }

      // Check win condition
      const allGone = bricks.every((row) => row.every((b) => !b.alive));
      if (allGone) endGame("YOU WIN!");
    }

    /* ── DRAW EVERYTHING ── */
    function draw() {
      // Background
      ctx.fillStyle = "#0d0d0d";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Bricks
      for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          if (!bricks[r][c].alive) continue;
          const bx = BRICK_PAD + c * (BRICK_W + BRICK_PAD);
          const by = BRICK_TOP + r * (BRICK_H + BRICK_PAD);
          ctx.fillStyle = ROW_COLORS[r];
          ctx.fillRect(bx, by, BRICK_W, BRICK_H);
          // Subtle inner highlight
          ctx.fillStyle = "rgba(255,255,255,0.1)";
          ctx.fillRect(bx, by, BRICK_W, 3);
        }
      }

      // Paddle
      ctx.fillStyle = "#e8e8e8";
      ctx.beginPath();
      ctx.roundRect(padX, PAD_Y, PAD_W, PAD_H, 4);
      ctx.fill();

      // Ball
      ctx.fillStyle = "#ff6b4d";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
    }

    /* ── GAME OVER / WIN ── */
    function endGame(msg) {
      gameRunning = false;
      cancelAnimationFrame(animId);
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ff6b4d";
      ctx.font = "bold 22px 'Space Mono', monospace";
      ctx.textAlign = "center";
      ctx.fillText(msg, canvas.width / 2, canvas.height / 2 - 12);
      ctx.fillStyle = "#666";
      ctx.font = "12px 'Space Mono', monospace";
      ctx.fillText("PRESS SPACE TO RESTART", canvas.width / 2, canvas.height / 2 + 16);
    }

    /* ── UPDATE HUD ── */
    function updateHUD() {
      document.getElementById("score-val").textContent = score;
      document.getElementById("lives-val").textContent = lives;
    }

    /* ── KEYBOARD INPUT ── */
    const keys = {};
    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === " " && !gameRunning) init();
      if (["ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
    });
    document.addEventListener("keyup",  (e) => { keys[e.key] = false; });

    // Move paddle based on held keys — done inside a separate setInterval
    // so movement is smooth regardless of animation frame timing
    setInterval(() => {
      const speed = 7;
      if (keys["ArrowLeft"] || keys["a"]) padX = Math.max(0, padX - speed);
      if (keys["ArrowRight"]|| keys["d"]) padX = Math.min(canvas.width - PAD_W, padX + speed);
    }, 16);

    /* ── MOUSE / TOUCH INPUT ── */
    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx   = e.clientX - rect.left;
      padX = Math.min(Math.max(mx - PAD_W / 2, 0), canvas.width - PAD_W);
    });

    init();
  </script>
</body>
</html>
